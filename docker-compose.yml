services:
  app:
    image: trungnghia1996/school_enrollment_be:latest
    container_name: school_enrollment_be
    ports:
      - "8080:8080"
    environment:
      APP_NAME: "Enrollment System"
      APP_ENV: production
      APP_PORT: "8080"
      APP_TIMEZONE: Asia/Ho_Chi_Minh
      MYSQL_HOST: 103.47.224.231
      MYSQL_PORT: "3306"
      MYSQL_DB: my_database
      MYSQL_USER: root
      MYSQL_PASSWORD: password123
      MYSQL_PARAMS: "charset=utf8mb4&parseTime=True&loc=Local"
      JWT_SECRET: super_secret_for_jwt_change_in_production
      JWT_EXPIRES_IN: 24h
      CORS_ALLOW_ORIGINS: "*"
      R2_ACCOUNT_ID: ""
      R2_ACCESS_KEY_ID: ""
      R2_SECRET_ACCESS_KEY: ""
      R2_BUCKET_NAME: ""
      R2_ENDPOINT: ""
      R2_PUBLIC_BASE_URL: ""
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: your_email@gmail.com
      SMTP_PASSWORD: your_app_password
      SMTP_FROM: "Enrollment System <your_email@gmail.com>"
    restart: unless-stopped
