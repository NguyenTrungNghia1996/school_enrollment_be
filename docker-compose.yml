version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go_be_enrollment_app
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - APP_PORT=8080
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=enrollment_db
      - JWT_SECRET=supersecretjwtkeyforcourse2026
      # AWS variables for any S3 integrations
      - AWS_REGION=ap-southeast-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_BUCKET=enrollment-bucket
    depends_on:
      db:
        condition: service_healthy
    networks:
      - enrollment_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: go_be_enrollment_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: enrollment_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    # Set proper character encoding for MySQL 8
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enrollment_network
    restart: unless-stopped

volumes:
  db_data:

networks:
  enrollment_network:
    driver: bridge
